<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1720 920" role="img" aria-labelledby="title desc">
  <title id="title">Eviction risk demo architecture</title>
  <desc id="desc">Two-lane architecture diagram showing build and deploy flow and runtime request flow.</desc>
  <defs>
    <linearGradient id="canvasBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faff" />
      <stop offset="100%" stop-color="#eef3ff" />
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#a8b8dd" flood-opacity="0.25" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="#56709f" />
    </marker>
    <style>
      .lane-box {
        fill: #f8fbff;
        stroke: #c4d2ef;
        stroke-width: 2.2;
        stroke-dasharray: 8 8;
        rx: 24;
      }
      .node {
        fill: #ffffff;
        stroke: #cddaf3;
        stroke-width: 2;
        rx: 16;
        filter: url(#cardShadow);
      }
      .lane-title {
        font: 700 23px Inter, Arial, sans-serif;
        fill: #1b315b;
      }
      .lane-sub {
        font: 500 14px Inter, Arial, sans-serif;
        fill: #5a7098;
      }
      .node-title {
        font: 650 16px Inter, Arial, sans-serif;
        fill: #132748;
      }
      .node-sub {
        font: 500 13px Inter, Arial, sans-serif;
        fill: #4b638d;
      }
      .arrow {
        fill: none;
        stroke: #56709f;
        stroke-width: 2.6;
        marker-end: url(#arrow);
      }
      .chip {
        fill: #eef4ff;
        stroke: #bfd0f4;
        stroke-width: 1.4;
        rx: 10;
      }
      .chip-text {
        font: 600 12.5px Inter, Arial, sans-serif;
        fill: #355182;
      }
      .icon-bg {
        fill: #f1f6ff;
        stroke: #bcd0f6;
        stroke-width: 1.2;
      }
      .mini {
        font: 700 11px Inter, Arial, sans-serif;
      }
    </style>
  </defs>

  <rect x="8" y="8" width="1704" height="904" rx="28" fill="url(#canvasBg)" stroke="#d8e2f7" stroke-width="1.4" />

  <rect class="lane-box" x="50" y="90" width="1620" height="330" />
  <text class="lane-title" x="82" y="132">Lane A: Build &amp; Deploy (one-time per deploy)</text>
  <text class="lane-sub" x="82" y="156">Triggered by Git push, runs Docker multi-stage build-time training, then ships runtime image.</text>

  <rect class="lane-box" x="50" y="470" width="1620" height="330" />
  <text class="lane-title" x="82" y="512">Lane B: Runtime (on every request)</text>
  <text class="lane-sub" x="82" y="536">UI calls FastAPI endpoints, API loads deployed artifacts, returns score + percentile.</text>

  <!-- Lane A nodes -->
  <rect class="node" x="86" y="186" width="242" height="170" />
  <circle class="icon-bg" cx="118" cy="222" r="17" />
  <circle cx="118" cy="222" r="11" fill="#1f2937" />
  <text x="118" y="226" text-anchor="middle" fill="#ffffff" class="mini">GH</text>
  <text class="node-title" x="146" y="220">GitHub (push)</text>
  <text class="node-sub" x="146" y="244">Source update triggers build</text>

  <rect class="node" x="358" y="186" width="242" height="170" />
  <circle class="icon-bg" cx="390" cy="222" r="17" />
  <rect x="381" y="213" width="18" height="18" rx="4" fill="#46e3b7" />
  <path d="M386 227 L386 217 L394 217 C397 217 399 219 399 222 C399 225 397 227 394 227 Z" fill="#0f172a" />
  <text class="node-title" x="418" y="220">Render build</text>
  <text class="node-sub" x="418" y="244">Docker multi-stage build</text>

  <rect class="node" x="630" y="186" width="242" height="170" />
  <circle class="icon-bg" cx="662" cy="222" r="17" />
  <path d="M653 212 H668 L673 217 V232 H653 Z" fill="#eaf1ff" stroke="#5f7fb5" stroke-width="1.2" />
  <path d="M668 212 V217 H673" fill="none" stroke="#5f7fb5" stroke-width="1.2" />
  <text x="662" y="228" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="700" fill="#36558a">CSV</text>
  <text class="node-title" x="690" y="220">Download CSV</text>
  <text class="node-sub" x="690" y="244">Eviction Lab county data</text>

  <rect class="node" x="902" y="186" width="242" height="170" />
  <circle class="icon-bg" cx="934" cy="222" r="17" />
  <path d="M925 216 C925 212 928 210 932 210 H936 V218 H930 C927 218 925 220 925 223 C925 226 927 228 930 228 H936 V234 H932 C928 234 925 232 925 228 Z" fill="#3776ab" />
  <path d="M943 216 C943 212 940 210 936 210 H932 V218 H938 C941 218 943 220 943 223 C943 226 941 228 938 228 H932 V234 H936 C940 234 943 232 943 228 Z" fill="#ffd343" />
  <text class="node-title" x="962" y="220">Train model</text>
  <text class="node-sub" x="962" y="244">Python + scikit-learn</text>

  <rect class="node" x="1174" y="186" width="242" height="170" />
  <circle class="icon-bg" cx="1206" cy="222" r="17" />
  <rect x="1195" y="222" width="20" height="9" rx="3" fill="#2496ed" />
  <rect x="1197" y="213" width="6" height="6" fill="#2496ed" />
  <rect x="1205" y="213" width="6" height="6" fill="#2496ed" />
  <rect x="1213" y="213" width="6" height="6" fill="#2496ed" />
  <circle cx="1221" cy="226" r="2.2" fill="#2496ed" />
  <text class="node-title" x="1234" y="220">Package runtime image</text>
  <text class="node-sub" x="1234" y="244">Copy model artifacts only</text>

  <rect class="node" x="1446" y="186" width="190" height="170" />
  <circle class="icon-bg" cx="1478" cy="222" r="17" />
  <path d="M1476 211 L1483 218 L1479 222 L1484 227 L1478 233 L1473 228 L1469 232 L1468 222 Z" fill="#46e3b7" stroke="#19745f" stroke-width="1" />
  <text class="node-title" x="1504" y="220">Deploy (Render)</text>
  <text class="node-sub" x="1504" y="244">Publish public service</text>

  <!-- Lane A arrows -->
  <path class="arrow" d="M328 271 H358" />
  <path class="arrow" d="M600 271 H630" />
  <path class="arrow" d="M872 271 H902" />
  <path class="arrow" d="M1144 271 H1174" />
  <path class="arrow" d="M1416 271 H1446" />

  <!-- Lane B nodes -->
  <rect class="node" x="112" y="560" width="330" height="170" />
  <circle class="icon-bg" cx="146" cy="596" r="17" />
  <rect x="136" y="587" width="20" height="14" rx="2.5" fill="#4f7ec9" />
  <rect x="140" y="603" width="12" height="2.6" rx="1" fill="#4f7ec9" />
  <text class="node-title" x="176" y="594">Static demo UI (/demo)</text>
  <text class="node-sub" x="176" y="618">Browser request from end user</text>

  <rect class="node" x="482" y="560" width="330" height="170" />
  <circle class="icon-bg" cx="516" cy="596" r="17" />
  <path d="M513 585 L521 585 L517 594 H523 L511 607 L514 598 H509 Z" fill="#009688" />
  <text class="node-title" x="546" y="594">FastAPI service</text>
  <text class="node-sub" x="546" y="618">/score, /score/batch, /metadata, /health</text>

  <rect class="node" x="852" y="560" width="330" height="170" />
  <circle class="icon-bg" cx="886" cy="596" r="17" />
  <ellipse cx="886" cy="589" rx="10" ry="4.5" fill="#4a6fb2" />
  <rect x="876" y="589" width="20" height="13" fill="#4a6fb2" />
  <ellipse cx="886" cy="602" rx="10" ry="4.5" fill="#4a6fb2" />
  <text class="node-title" x="916" y="594">Model artifacts</text>
  <text class="node-sub" x="916" y="618">joblib + metadata + feature table</text>

  <rect class="chip" x="916" y="647" width="244" height="28" />
  <text class="chip-text" x="928" y="666">Built at deploy-time, loaded at startup</text>

  <rect class="node" x="1222" y="560" width="386" height="170" />
  <circle class="icon-bg" cx="1256" cy="596" r="17" />
  <path d="M1246 604 L1252 597 L1258 600 L1266 590" fill="none" stroke="#2555a0" stroke-width="2.1" />
  <circle cx="1246" cy="604" r="2.4" fill="#2555a0" />
  <circle cx="1252" cy="597" r="2.4" fill="#2555a0" />
  <circle cx="1258" cy="600" r="2.4" fill="#2555a0" />
  <circle cx="1266" cy="590" r="2.4" fill="#2555a0" />
  <text class="node-title" x="1286" y="594">Output</text>
  <text class="node-sub" x="1286" y="618">risk_score + percentile (response)</text>

  <!-- Lane B arrows -->
  <path class="arrow" d="M442 645 H482" />
  <path class="arrow" d="M812 645 H852" />
  <path class="arrow" d="M1182 645 H1222" />
</svg>
