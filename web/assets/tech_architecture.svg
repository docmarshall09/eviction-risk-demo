<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Cosign Eviction Risk Demo Architecture</title>
  <desc id="desc">Diagram of data pipeline, model training and artifacts, API and UI serving, Render hosting, GitHub source control, and Docker build-time training workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8faff" />
      <stop offset="100%" stop-color="#eef3ff" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#5a6f99" />
    </marker>
    <style>
      .lane-title { font: 700 24px Inter, Arial, sans-serif; fill: #1a2d52; }
      .box-title { font: 700 18px Inter, Arial, sans-serif; fill: #0f1f3b; }
      .box-text { font: 500 14px Inter, Arial, sans-serif; fill: #334b72; }
      .node { fill: #ffffff; stroke: #cddaf5; stroke-width: 2; rx: 16; }
      .node-accent { fill: #f3f7ff; stroke: #b6c8f1; stroke-width: 2.2; rx: 16; }
      .arrow { stroke: #5a6f99; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .subtle { font: 600 13px Inter, Arial, sans-serif; fill: #5f7298; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)" />

  <text class="lane-title" x="50" y="58">Build-time training in Docker multi-stage</text>
  <text class="lane-title" x="50" y="410">Runtime architecture</text>

  <rect class="node-accent" x="48" y="85" width="240" height="110" />
  <text class="box-title" x="74" y="125">Git push</text>
  <text class="box-text" x="74" y="150">Developer pushes code</text>
  <text class="box-text" x="74" y="171">to GitHub</text>

  <rect class="node-accent" x="335" y="85" width="245" height="110" />
  <text class="box-title" x="360" y="125">Render Docker build</text>
  <text class="box-text" x="360" y="150">Build starts from repo</text>
  <text class="box-text" x="360" y="171">Dockerfile (multi-stage)</text>

  <rect class="node-accent" x="625" y="85" width="270" height="110" />
  <text class="box-title" x="650" y="125">Download CSV + train</text>
  <text class="box-text" x="650" y="150">Fetch public Eviction Lab CSV</text>
  <text class="box-text" x="650" y="171">Run yearly training task</text>

  <rect class="node-accent" x="940" y="85" width="305" height="110" />
  <text class="box-title" x="965" y="125">Copy model artifacts into runtime image</text>
  <text class="box-text" x="965" y="150">joblib + metadata + feature table</text>
  <text class="box-text" x="965" y="171">No raw CSV in final image</text>

  <rect class="node-accent" x="1290" y="85" width="250" height="110" />
  <text class="box-title" x="1315" y="125">Deploy</text>
  <text class="box-text" x="1315" y="150">Ship container to Render</text>
  <text class="box-text" x="1315" y="171">Public service updated</text>

  <line class="arrow" x1="288" y1="140" x2="335" y2="140" />
  <line class="arrow" x1="580" y1="140" x2="625" y2="140" />
  <line class="arrow" x1="895" y1="140" x2="940" y2="140" />
  <line class="arrow" x1="1245" y1="140" x2="1290" y2="140" />

  <rect class="node" x="48" y="450" width="255" height="128" />
  <text class="box-title" x="72" y="488">Eviction Lab county CSV</text>
  <text class="box-text" x="72" y="513">(2000–2018 outcomes)</text>

  <rect class="node" x="340" y="450" width="318" height="128" />
  <text class="box-title" x="364" y="488">Feature builder</text>
  <text class="box-text" x="364" y="513">lag_1, lag_3_mean_obs,</text>
  <text class="box-text" x="364" y="535">lag_5_mean_obs, years_since_last_obs</text>

  <rect class="node" x="695" y="450" width="305" height="128" />
  <text class="box-title" x="720" y="488">Yearly logistic regression</text>
  <text class="box-text" x="720" y="513">(scikit-learn)</text>

  <rect class="node" x="1037" y="450" width="312" height="128" />
  <text class="box-title" x="1062" y="488">Model artifacts</text>
  <text class="box-text" x="1062" y="513">joblib + metadata + feature table</text>

  <line class="arrow" x1="303" y1="514" x2="340" y2="514" />
  <line class="arrow" x1="658" y1="514" x2="695" y2="514" />
  <line class="arrow" x1="1000" y1="514" x2="1037" y2="514" />

  <rect class="node" x="48" y="675" width="418" height="160" />
  <text class="box-title" x="72" y="715">FastAPI service</text>
  <text class="box-text" x="72" y="742">/score, /score/batch, /metadata, /health</text>
  <text class="box-text" x="72" y="767">Loads artifacts and serves scoring requests</text>

  <rect class="node" x="505" y="675" width="333" height="160" />
  <text class="box-title" x="529" y="715">Static demo UI</text>
  <text class="box-text" x="529" y="742">/demo/*</text>
  <text class="box-text" x="529" y="767">HTML/CSS/JS pages + charts</text>

  <rect class="node" x="877" y="675" width="285" height="160" />
  <text class="box-title" x="901" y="715">Render hosting</text>
  <text class="box-text" x="901" y="742">(public URL)</text>
  <text class="box-text" x="901" y="767">Routes API + static site</text>

  <rect class="node" x="1200" y="675" width="350" height="160" />
  <text class="box-title" x="1225" y="715">GitHub repo</text>
  <text class="box-text" x="1225" y="742">(source + deploy trigger)</text>
  <text class="box-text" x="1225" y="767">https://github.com/docmarshall09/cosign-public-data-poc</text>

  <line class="arrow" x1="1193" y1="578" x2="257" y2="675" />
  <text class="subtle" x="545" y="635">Artifacts available at runtime image start</text>

  <line class="arrow" x1="466" y1="755" x2="505" y2="755" />
  <line class="arrow" x1="838" y1="755" x2="877" y2="755" />
  <line class="arrow" x1="1270" y1="835" x2="1000" y2="835" />
  <line class="arrow" x1="1200" y1="745" x2="1162" y2="745" />
  <line class="arrow" x1="1200" y1="790" x2="1540" y2="195" />
  <text class="subtle" x="1264" y="242">triggers render build/deploy</text>
</svg>
